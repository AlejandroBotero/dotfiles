;==========================================================
;
;   Beautiful Polybar Configuration
;
;==========================================================

[global/wm]
margin-bottom = 0
margin-top = 0

[colors]
background = #1a1a2e
background-alt = #16213e
foreground = #eaeaea
foreground-alt = #7a7a8c
primary = #7f5af0
secondary = #2cb67d
alert = #ef4565
blue = #3da9fc
purple = #7f5af0

[bar/main]
width = 100%
height = 32
offset-x = 0
offset-y = 0
bottom = false
fixed-center = true
font-0 = "JetBrainsMonoNL Nerd Font:size=11;2"

modules-left = cpu ram disk gpu
modules-center = date time
modules-right = network battery volume

tray-background = ${colors.background}
tray-position = right
tray-padding = 2
tray-maxsize = 16

dim-value = 1.0

[module/cpu]
type = internal/cpu
interval = 2
format = <label>
format-prefix = " 󰘚 "
format-prefix-foreground = #3da9fc
label = "%percentage%%"
label-foreground = #eaeaea

[module/ram]
type = internal/memory
interval = 2
format = <label>
format-prefix = " 󰍛 "
format-prefix-foreground = #7f5af0
label = "%mb_used%"
label-foreground = #eaeaea

[module/disk]
type = custom/script
exec = df -m / | awk 'NR==2 {print $3}'
interval = 30
format = <label>
format-prefix = " 󰉌 "
format-prefix-foreground = #2cb67d
label = "%output% MB"
label-foreground = #eaeaea

[module/gpu]
type = custom/script
exec = /home/alejo/dotfiles/scripts/gpu_usage.sh
interval = 5
format = <label>
format-prefix = " 󰢮 "
format-prefix-foreground = #2cb67d
label = %output%
label-foreground = #eaeaea

[module/date]
type = internal/date
interval = 60
date = %d
date-alt = %Y-%m-%d
format = <label>
format-prefix = " "
format-prefix-foreground = ${colors.blue}
label = "%date% "
label-foreground = ${colors.foreground}

[module/time]
type = internal/date
interval = 1
time = %H:%M:%S
time-alt = %H:%M:%S
format = <label>
format-prefix = ""
format-prefix-foreground = ${colors.primary}
label = "%time%"
label-foreground = ${colors.foreground}

[module/network]
type = internal/network
interface = wlan0
interval = 3
format-connected = <label-connected>
format-connected-prefix = " 󰤢 "
format-connected-prefix-foreground = ${colors.secondary}
format-disconnected = <label-disconnected>
format-disconnected-prefix = " 󰤭 "
format-disconnected-prefix-foreground = ${colors.alert}
label-connected = "%signal%"
label-disconnected = "OFF"
label-disconnected-foreground = ${colors.alert}

[module/battery]
type = internal/battery
battery = BAT0
adapter = AC
interval = 30
format-charging = <label-charging>
format-charging-prefix = " 󰂄 "
format-charging-prefix-foreground = ${colors.secondary}
format-discharging = <label-discharging>
format-discharging-prefix = " 󰁿 "
format-discharging-prefix-foreground = ${colors.alert}
format-full = <label-full>
format-full-prefix = " 󰁹 "
format-full-prefix-foreground = ${colors.secondary}
label-charging = "%percentage%% "
label-discharging = "%percentage%% "
label-full = "%percentage%% "
label-foreground = ${colors.foreground}

[module/volume]
type = internal/pulseaudio
format-volume = <ramp-volume> <label-volume>
label-volume = "%percentage%%"
label-volume-foreground = #eaeaea
format-muted = <label-muted>
format-muted-prefix = " 󰝟 "
format-muted-prefix-foreground = #7a7a8c
label-muted = "MUTED"
label-muted-foreground = #7a7a8c

ramp-volume-0 = 󰕿
ramp-volume-1 = 󰖀
ramp-volume-2 = 󰕾
ramp-volume-foreground = #7f5af0

[settings]
screenchange-reload = false
compositing-background = source
compositing-foreground = source
compositing-alphaworkspace = source
