[ids]
*

[main]
f12 = toggle(homerowmods)
f11 = toggle(dvorak)

[homerowmods]
u+i = toggle(mousemode)
m+comma = enter
m+comma+dot = tab
c+v = backspace
c+v+x = escape
q = overloadt(nav, q, 200)
p = overloadt(nav, p, 200)
backspace = capslock
capslock = backspace
leftmeta+leftshift+f23 = leftcontrol

a = overloadt(shift, a, 200)
s = overloadt(control, s,200)
d = overloadt(meta, d, 200)
f = overloadt(alt, f, 200)
j = overloadt(numlay, j, 200)
k = overloadt(meta, k, 200)
l = overloadt(control, l, 200)
semicolon = overloadt(shift, semicolon, 200)

